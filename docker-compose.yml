services:
  neo4j:
    # Pinned to 5.26.0 — n10s plugin auto-installer downloads neosemantics-5.26.0,
    # which bundles an older jackson-annotations that crashes Enterprise's
    # LinuxDeviceMapper on later 5.26.x patches. Keep image and plugin in sync.
    image: neo4j:5.26.0-enterprise
    container_name: kf-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: eval
      NEO4J_PLUGINS: '["apoc","n10s"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,n10s.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,n10s.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

  api:
    # Built from the repo's Dockerfile. Same image is what you'd push to a
    # registry for staging/prod — single source of truth.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kf-api
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # Talk to neo4j over the docker-compose network, not localhost.
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LLM_DAILY_USD_CAP: ${LLM_DAILY_USD_CAP:-5.0}
      # Production hardening — set these in your .env before bringing up
      # the stack on anything other than localhost.
      API_KEY: ${API_KEY:-}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      # CORS lockdown — same-origin only by default since the dashboard is
      # served from the same FastAPI process.
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
    volumes:
      # Bundles + runtime state survive container rebuilds.
      - kf_use_cases:/app/use_cases
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  kf_use_cases:
