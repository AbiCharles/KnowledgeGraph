name: CI

# Run on every push to main and on every PR. The pytest suite stubs Neo4j
# and OpenAI so it runs offline in seconds — no live services needed.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        # Inject the env vars Settings() requires; tests stub the actual
        # Neo4j + OpenAI calls so these values are never used at the wire.
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: ci-test-password
          OPENAI_API_KEY: sk-ci-not-real
        run: pytest -q

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: kf-knowledge-graph:ci
          # Use GitHub Actions cache so subsequent builds are fast.
          cache-from: type=gha
          cache-to: type=gha,mode=max
